<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>Page not found · MapChat</title>
<!-- Root-absolute asset/link paths so this works at any URL depth GitHub Pages serves it for. -->
<link rel="icon" type="image/png" href="/assets/icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Caveat:wght@600&display=swap" rel="stylesheet" />
<style>
  :root { --electric:#0040ff; --black:#0a0a0a; --white:#ffffff; --mute:rgba(255,255,255,.62); }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; }
  body {
    background:var(--black); color:var(--white);
    font-family:'Space Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    min-height:100dvh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:32px;
  }
  .wrap { max-width:520px; }
  .logo { width:104px; height:104px; margin:0 auto 28px; display:block; }
  .code { font-family:'Caveat', cursive; color:var(--electric); font-size:30px; letter-spacing:.04em; margin:0 0 6px; }
  h1 { font-size:clamp(28px, 6vw, 40px); line-height:1.1; margin:0 0 14px; font-weight:700; }
  p.lede { color:var(--mute); font-size:16px; line-height:1.5; margin:0 0 30px; }
  .btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  a.btn { display:inline-block; text-decoration:none; font-weight:600; font-size:15px; padding:13px 22px; border-radius:999px; }
  a.primary { background:var(--electric); color:#fff; }
  a.ghost { border:1px solid rgba(255,255,255,.28); color:#fff; }
  a.btn:hover { opacity:.9; }
</style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="/assets/icon.png" alt="MapChat" />
    <p class="code">Error 404</p>
    <h1>This page fluttered off.</h1>
    <p class="lede">The link you followed doesn't exist (or moved). Let's get you back to where the night is happening.</p>
    <div class="btns">
      <a class="btn primary" href="/">Back to mapchat.social</a>
      <a class="btn ghost" href="https://apps.apple.com/us/app/mapchat-social/id6761695226" target="_blank" rel="noopener noreferrer">Get the app</a>
    </div>
  </main>
</body>
</html>
